<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#d97706"/>
  <g transform="translate(96,105)" fill="#fef3c7" stroke="#fef3c7">
    <!-- Tractor body -->
    <rect x="-20" y="-35" width="45" height="30" rx="4"/>
    <!-- Cab -->
    <rect x="-5" y="-55" width="28" height="25" rx="3"/>
    <!-- Cab window -->
    <rect x="0" y="-50" width="18" height="14" rx="2" fill="#d97706" stroke="none"/>
    <!-- Hood -->
    <rect x="-45" y="-28" width="30" height="18" rx="3"/>
    <!-- Exhaust pipe -->
    <rect x="-42" y="-42" width="5" height="16" rx="2"/>
    <!-- Big rear wheel -->
    <circle cx="10" cy="5" r="22" fill="none" stroke-width="7"/>
    <circle cx="10" cy="5" r="8" fill="#d97706" stroke-width="3"/>
    <!-- Small front wheel -->
    <circle cx="-38" cy="5" r="14" fill="none" stroke-width="6"/>
    <circle cx="-38" cy="5" r="5" fill="#d97706" stroke-width="3"/>
  </g>
</svg>
